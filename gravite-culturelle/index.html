<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Homogeneisation divergente - Simulation gravitationnelle</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="canvas"></canvas>

  <a id="github-link" href="https://github.com/terahlunah/homogeneisation-divergente" target="_blank" rel="noopener" title="View source on GitHub">
    <svg viewBox="0 0 16 16" width="20" height="20" fill="currentColor">
      <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
    </svg>
  </a>

  <script type="module">
    import GUI from 'https://cdn.jsdelivr.net/npm/lil-gui@0.20/+esm';
    import { createSeed, step } from './simulation.js';
    import { render, renderTitle } from './renderer.js';
    import { startRecording, stopRecording, isRecording } from './export.js';

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    window.addEventListener('resize', resize);
    resize();

    // Internal constants (not exposed)
    const G = 0.00003;
    const EPSILON = 0.04;
    const REPULSION = 0.001;
    const REP_RADIUS = 0.06;
    const SUBSTEPS = 3;
    const BASE_DT = (1 / 60) / SUBSTEPS;

    // Exposed settings
    const settings = {
      speed: 2.5,
      falloff: 1.3,
      damping: 0.95,
      particles: 1000,
      clusters: 10,
      start() { toggleRunning(); },
      reset() { doReset(); },
      reseed() { doReseed(); },
      export() { toggleExport(); },
      cancelExport() { doCancelExport(); },
    };

    // --- State ---
    let currentSeed, particles;
    let running = false;

    function doReset() {
      particles = createSeed(currentSeed, settings.particles, settings.clusters);
      running = false;
      if (startCtrl) startCtrl.name('Start');
      renderFrame();
    }

    function doReseed() {
      currentSeed = Math.floor(Math.random() * 0x7FFFFFFF);
      doReset();
    }

    function toggleRunning() {
      running = !running;
      startCtrl.name(running ? 'Pause' : 'Start');
      if (running) requestAnimationFrame(animate);
    }

    // --- lil-gui ---
    const gui = new GUI({ title: 'Settings' });

    gui.add(settings, 'speed', 0.01, 20, 0.01).name('Speed');
    gui.add(settings, 'falloff', 0.5, 2.0, 0.05).name('Falloff');
    gui.add(settings, 'damping', 0.8, 0.999, 0.005).name('Damping');

    const seedFolder = gui.addFolder('Seeding');
    seedFolder.add(settings, 'particles', 200, 5000, 100).name('Particles').onFinishChange(doReseed);
    seedFolder.add(settings, 'clusters', 2, 12, 1).name('Clusters').onFinishChange(doReseed);

    const startCtrl = gui.add(settings, 'start').name('Start');
    gui.add(settings, 'reset').name('Reset');
    gui.add(settings, 'reseed').name('Reseed');
    const exportCtrl = gui.add(settings, 'export').name('Export');
    const cancelCtrl = gui.add(settings, 'cancelExport').name('Cancel recording');
    cancelCtrl.hide();

    // --- Render frame ---
    function renderFrame() {
      const dt = BASE_DT * settings.speed;
      const params = { G, epsilon: EPSILON, falloff: settings.falloff, repulsion: REPULSION, repRadius: REP_RADIUS, damping: settings.damping };

      if (running) {
        for (let i = 0; i < SUBSTEPS; i++) {
          step(particles, dt, params);
        }
      }

      render(ctx, particles, canvas.width, canvas.height);
      renderTitle(ctx, canvas.width, canvas.height);
    }

    // --- Export toggle ---
    let exportPaused = false;

    let cancelExport = false;

    async function toggleExport() {
      if (isRecording()) {
        stopRecording();
        return;
      }
      const wasRunning = running;
      running = true;
      exportCtrl.name('Rec 0s');
      cancelCtrl.show();
      exportPaused = true;
      cancelExport = false;
      await startRecording(canvas, renderFrame, (seconds) => {
        exportCtrl.name(`Rec ${seconds}s`);
      });
      exportCtrl.name('Export');
      cancelCtrl.hide();
      exportPaused = false;
      running = wasRunning;
      startCtrl.name(running ? 'Pause' : 'Start');
      if (running) requestAnimationFrame(animate);
    }

    function doCancelExport() {
      if (isRecording()) {
        stopRecording(true); // true = cancel, skip download
      }
    }

    // --- Animation loop ---
    function animate() {
      if (exportPaused) return;
      renderFrame();
      if (running) requestAnimationFrame(animate);
    }

    // --- Initialization (starts paused) ---
    doReseed();
  </script>
</body>
</html>
